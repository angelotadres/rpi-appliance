name: build-client

on:
  push:
    branches: [main]
    tags: ['client-v*']
    paths:
      - 'client/**'
      - '.github/workflows/build-client.yml'
  pull_request:
    paths:
      - 'client/**'
  workflow_dispatch:

permissions:
  contents: write   # attach bundles to a release on client-v* tags

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macos
          - os: ubuntu-latest
            label: linux
          - os: windows-latest
            label: windows
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4

      - name: "Linux: webkit + build deps"
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: client/src-tauri

      - run: pnpm install --frozen-lockfile

      - name: Build the app bundle
        run: pnpm tauri build

      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: rpi-appliance-client-${{ matrix.label }}
          path: client/src-tauri/target/release/bundle/**
          if-no-files-found: error

      - name: Attach to release (client-v* tags)
        if: startsWith(github.ref, 'refs/tags/client-v')
        uses: softprops/action-gh-release@v2
        with:
          files: client/src-tauri/target/release/bundle/**
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
