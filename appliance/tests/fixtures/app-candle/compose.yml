# Fixture: the Phase 1 Candle app. Deliberately publishes to 0.0.0.0 to prove the
# appliance overrides it down to loopback.
services:
  candle:
    image: rpi-appliance/sample-app:dev
    container_name: appliance-gui
    labels:
      appliance.gui: "true"
    ports:
      - "0.0.0.0:5800:5800"
    environment:
      WEB_FILE_MANAGER: "1"
      WEB_FILE_MANAGER_ALLOWED_PATHS: "/data"
    restart: unless-stopped
