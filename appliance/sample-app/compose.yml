# Phase 1 dev/demo compose — runs the default sample app (Candle) off-Pi on any
# Docker host. NOT the appliance deployment mechanism; Phase 2 introduces the
# boot-folder compose that supersedes this.
services:
  sample-app:
    build: .
    image: rpi-appliance/sample-app:dev
    container_name: rpi-sample-app
    # noVNC web UI bound to loopback ONLY — the secure-by-default invariant.
    # Never 0.0.0.0; nothing answers on the LAN. (VNC 5900 is intentionally
    # not published.)
    ports:
      - "127.0.0.1:5800:5800"
    environment:
      # Web file manager, scoped to the mounted data dir.
      WEB_FILE_MANAGER: "1"
      WEB_FILE_MANAGER_ALLOWED_PATHS: "/data"
    volumes:
      # File-manager target and a place to drop .gcode files for the app.
      - ./data:/data
    restart: unless-stopped
