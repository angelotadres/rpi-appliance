# Appliance SSH hardening. SSH is the sole network-facing service and the only auth
# boundary; everything else is loopback-bound (Phase 2). Key-only by default; no
# default credentials ever ship.
PermitRootLogin no
PubkeyAuthentication yes
PasswordAuthentication no
KbdInteractiveAuthentication no
ChallengeResponseAuthentication no
X11Forwarding no
AllowAgentForwarding no

# The client opens a local port-forward (ssh -L) to the loopback noVNC port, so TCP
# forwarding MUST stay enabled — it is the tunnel.
AllowTcpForwarding yes
PermitTunnel no
